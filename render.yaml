services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: portfolio-advisor-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CIVIC_CLIENT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: AUTH_REDIRECT_URL
        sync: false
      - key: LLM_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: LLM_CONCURRENCY
        value: "1"
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: LLM_DELTA_THRESHOLD
        value: "5.0"
      - key: LLM_MAX_TICKERS_PER_CYCLE
        value: "50"
      - key: REFRESH_INTERVAL_MINUTES
        value: "30"
      - key: REFRESH_CYCLE_TIMEOUT_MINUTES
        value: "25"
      - key: FETCH_CONCURRENCY
        value: "20"
      - key: SCORE_BUY_THRESHOLD
        value: "35"
      - key: SCORE_SELL_THRESHOLD
        value: "65"
      - key: RATE_LIMIT_DEFAULT
        value: "60/minute"
      - key: SCORE_HISTORY_RETENTION_DAYS
        value: "90"
      - key: TOOLS_CONFIG_PATH
        value: tools_config.yaml

  # ── Frontend (React static site) ──────────────────────────────────────────
  - type: web
    name: portfolio-advisor-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
